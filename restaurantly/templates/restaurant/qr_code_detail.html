<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

    <title>Checklist</title>

    <style>
    .qr-code {
        margin-top: 25px;
    }
    .download {
        margin-right: 20px;
        margin-top: 30px;
    }
    .home {
        margin-left: 20px;
        margin-top: 30px;
    }
    </style>
</head>
<body style="background-color: #CACFD2">

<main>

    <div class="border"></div>

    <div class="qr-code d-flex justify-content-center">
        <div class="card-photo">
            <img src="data:image/png;base64,{{ qr_code_base64 }}" alt="QR Code">
        </div>
    </div>

    <div class="d-flex justify-content-center">

        <a href="data:image/png;base64,{{ qr_code_base64 }}"
           class="download btn"
           style="background-color: #9736DD; color: #2A2ABD"
           download="qrcode.png">
            Download QR Code
        </a>

        <a href="data:text/plain;base64,{{ txt_base64 }}"
           class="download btn"
           style="background-color: #9736DD; color: #2A2ABD"
           download="booking.txt">
            Download File
        </a>

        <a href="{% url 'index' %}" class="home btn"
           style="background-color: #9736DD; color: #2A2ABD">
            Home
        </a>

    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
</body>
</html>
